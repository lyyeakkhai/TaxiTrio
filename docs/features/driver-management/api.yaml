openapi: "3.0.3"
info:
  title: Driver Management
  version: "1.0"
paths:
  /api/driver/profile:
    get:
      summary: Get own profile (driver)
      security:
        - ClerkAuth: []
      responses:
        "200":
          description: Driver profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    put:
      summary: Update own profile (driver)
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DriverProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /api/driver/availability:
    put:
      summary: Toggle availability (driver)
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_available]
              properties:
                is_available:
                  type: boolean
      responses:
        "200":
          description: Availability updated

  /api/driver/earnings:
    get:
      summary: Earnings summary (driver)
      security:
        - ClerkAuth: []
      responses:
        "200":
          description: Earnings data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"

  /api/driver/reviews:
    get:
      summary: Reviews received (driver)
      security:
        - ClerkAuth: []
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /api/admin/drivers:
    get:
      summary: List all drivers (admin)
      security:
        - ClerkAuth: []
      parameters:
        - name: verification_status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: is_available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: All drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"

  /api/admin/drivers/{id}:
    get:
      summary: Driver detail (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Driver detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    put:
      summary: Update driver record (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverAdminInput"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    delete:
      summary: Delete driver (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted

  /api/admin/drivers/{id}/approve:
    put:
      summary: Approve driver (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Driver approved

  /api/admin/drivers/{id}/reject:
    put:
      summary: Reject driver (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Driver rejected

components:
  securitySchemes:
    ClerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    DriverProfileInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        languages:
          type: array
          items:
            type: string
        photo:
          type: string
          format: binary

    DriverAdminInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        languages:
          type: array
          items:
            type: string
        taxi_id:
          type: string
          format: uuid
          nullable: true

    Driver:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        taxi_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        phone:
          type: string
        languages:
          type: array
          items:
            type: string
        verification_status:
          type: string
          enum: [pending, approved, rejected]
        rating:
          type: number
          format: float
        is_available:
          type: boolean
        profile_photo:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    EarningsSummary:
      type: object
      properties:
        total_earnings:
          type: number
        completed_trips:
          type: integer
        average_rating:
          type: number
        earnings:
          type: array
          items:
            type: object
            properties:
              booking_id:
                type: string
                format: uuid
              amount:
                type: number
              created_at:
                type: string
                format: date-time

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        booking_id:
          type: string
          format: uuid
        customer_name:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
