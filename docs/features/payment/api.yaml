openapi: "3.0.3"
info:
  title: Payment
  version: "1.0"
paths:
  /api/payments/{booking_id}/upload-proof:
    post:
      summary: Upload payment proof (customer)
      security:
        - ClerkAuth: []
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [proof]
              properties:
                proof:
                  type: string
                  format: binary
      responses:
        "200":
          description: Proof uploaded, status set to pending_verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /api/payments/{booking_id}:
    get:
      summary: View own payment status (customer)
      security:
        - ClerkAuth: []
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /api/admin/payments:
    get:
      summary: All payments (admin)
      security:
        - ClerkAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [unpaid, pending_verification, authorized, verified, captured, invoice_pending, rejected, refunded]
        - name: method
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: All payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /api/admin/payments/{id}:
    get:
      summary: Payment detail with proof image URL (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /api/admin/payments/{id}/verify:
    put:
      summary: Verify payment (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Payment verified

  /api/admin/payments/{id}/reject:
    put:
      summary: Reject payment (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Payment rejected

components:
  securitySchemes:
    ClerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        booking_id:
          type: string
          format: uuid
        amount:
          type: number
        fee:
          type: number
        net_amount:
          type: number
        method:
          type: string
          enum: [cash, aba, khqr, wing, card, wallet, corporate]
        status:
          type: string
          enum: [unpaid, pending_verification, authorized, verified, captured, invoice_pending, rejected, refunded]
        transaction_id:
          type: string
          nullable: true
        proof_image:
          type: string
          format: uri
          nullable: true
        verified_by:
          type: string
          format: uuid
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
