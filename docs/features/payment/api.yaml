openapi: "3.0.3"
info:
  title: Payment
  version: "1.0"
paths:
  /api/payments/{booking_id}:
    get:
      summary: View own payment status (customer)
      security:
        - ClerkAuth: []
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /api/admin/payments:
    get:
      summary: All payments (admin)
      security:
        - ClerkAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [unpaid, pending, paid, failed, refunded]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: All payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /api/admin/payments/{id}:
    get:
      summary: Payment detail (admin)
      security:
        - ClerkAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /api/webhooks/clerk/billing:
    post:
      summary: Clerk billing webhook handler
      responses:
        "200":
          description: OK

components:
  securitySchemes:
    ClerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        booking_id:
          type: string
          format: uuid
        amount:
          type: number
        fee:
          type: number
        net_amount:
          type: number
        status:
          type: string
          enum: [unpaid, pending, paid, failed, refunded]
        clerk_subscription_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
